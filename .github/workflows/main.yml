name: Build Expo APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - run: npm install
      
      - run: eas build --platform android --non-interactive --output=app.apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app.apk
